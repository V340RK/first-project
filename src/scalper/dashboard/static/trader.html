<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V340RK — Scalper</title>
    <link rel="stylesheet" href="/static/trader.css">
</head>
<body>
    <div class="panel">
        <header class="header">
            <div class="title">V340RK</div>
            <div class="sub">scalper control panel — кожна пара торгується окремим процесом</div>
        </header>

        <section class="card balance-bar">
            <div class="balance-block">
                <div class="balance-label">Доступно на акаунті</div>
                <div class="balance-value" id="balance-available">— USDT</div>
            </div>
            <div class="balance-block">
                <div class="balance-label">Wallet (всього)</div>
                <div class="balance-value-small" id="balance-wallet">—</div>
            </div>
            <div class="balance-block">
                <div class="balance-label">Unrealized PnL</div>
                <div class="balance-value-small" id="balance-upnl">—</div>
            </div>
            <div class="balance-meta" id="balance-meta">оновлюється…</div>
        </section>

        <section class="card">
            <label class="label">Додати пару (з <span id="symbols-count">—</span> доступних на Binance Futures USDT-M):</label>
            <div class="chips-box" id="add-pair-box">
                <input type="text" id="pair-input" autocomplete="off"
                       placeholder="Почни вводити: BTC, ETH, SOL…" />
                <div class="dropdown hidden" id="symbol-dropdown"></div>
            </div>
            <div class="hint">Клік по пропозиції або Enter — додає слот для цієї пари.</div>
        </section>

        <section id="slots-container">
            <!-- Тут динамічно з'являються slot-картки -->
            <div class="empty-state" id="empty-state">
                ще немає жодної пари. Додай першу зверху.
            </div>
        </section>

        <div id="error-banner" class="error-banner hidden"></div>

        <footer class="footer">
            <a href="/">→ технічний дашборд (усі події журналу)</a>
        </footer>
    </div>

    <!-- Темплейт slot-картки. Клонуємо при додаванні пари. -->
    <template id="slot-template">
        <section class="slot-card" data-symbol="">
            <header class="slot-header">
                <h3 class="slot-symbol"></h3>
                <div class="slot-state pill pill-stopped">stopped</div>
                <button type="button" class="slot-remove" title="Видалити слот">×</button>
            </header>

            <div class="slot-config">
                <div class="form-row">
                    <label>Плече: <span class="leverage-val">5x</span></label>
                    <input type="range" class="slot-leverage" min="1" max="20" value="5" />
                </div>
                <div class="form-row">
                    <label>Розмір позиції</label>
                    <div class="sizing-group">
                        <select class="slot-sizing-mode" title="Тип сайзингу">
                            <option value="risk_usd">Ризик USDT</option>
                            <option value="margin_pct">% балансу (margin)</option>
                        </select>
                        <input type="number" class="slot-sizing-value" min="0.01" step="0.01" value="0.50" />
                    </div>
                    <div class="hint sizing-hint">Скільки втратиш якщо стоп спрацює (R-based)</div>
                </div>
                <div class="form-row">
                    <label>Режим</label>
                    <select class="slot-mode">
                        <option value="paper">paper</option>
                        <option value="live" selected>live</option>
                    </select>
                </div>
            </div>

            <div class="slot-actions">
                <button type="button" class="btn btn-primary slot-start">▶ START</button>
                <button type="button" class="btn btn-danger slot-stop" disabled>⏸ STOP</button>
            </div>

            <div class="slot-stats">
                <div class="stat"><div class="stat-label">Угод</div><div class="stat-value stat-trades">—</div></div>
                <div class="stat"><div class="stat-label">Час роботи</div><div class="stat-value stat-uptime">—</div></div>
                <div class="stat"><div class="stat-label">ПНЛ R</div><div class="stat-value stat-r">—</div></div>
                <div class="stat"><div class="stat-label">ПНЛ USDT</div><div class="stat-value stat-usd">—</div></div>
                <div class="stat"><div class="stat-label">Відкрито</div><div class="stat-value stat-open">—</div></div>
                <div class="stat"><div class="stat-label">Остання подія</div><div class="stat-value stat-last">—</div></div>
            </div>
        </section>
    </template>

    <script src="/static/trader.js"></script>
</body>
</html>
